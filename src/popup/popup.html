<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple Highlights Library</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-root">
      <header class="popup-header">
        <h1>Highlights Library</h1>
        <p>Subrayados agrupados por sitio web</p>
      </header>

      <section class="search-wrap" aria-label="Buscar subrayados">
        <input
          id="library-search"
          class="search-input"
          type="search"
          placeholder="Buscar por texto, titulo o sitio"
          autocomplete="off"
        />
        <div class="search-controls">
          <button id="sort-mode-button" class="control-button" type="button" aria-label="Cambiar orden">
            Orden: Relevancia
          </button>
          <button id="group-toggle-button" class="control-button" type="button" aria-pressed="true" aria-label="Agrupar por sitio web">
            Agrupar: Sitio
          </button>
        </div>
      </section>

      <section id="library-content" class="library-content" aria-live="polite"></section>
    </main>

    <script src="../shared/highlight-library.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
